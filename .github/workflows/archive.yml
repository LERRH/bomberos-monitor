name: Archivar emergencias

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch: {}

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python archiver.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

